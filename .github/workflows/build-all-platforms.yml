name: Build All Platforms
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build Tauri app
      run: npm run tauri build
    
    - name: List build artifacts (debug)
      run: |
        echo "Listing target directory:"
        if (Test-Path "src-tauri/target/release/bundle/") { Get-ChildItem -Recurse "src-tauri/target/release/bundle/" } else { echo "Bundle directory not found" }
        echo "Finding Windows executables:"
        Get-ChildItem -Recurse "src-tauri/target" -Include "*.exe" -ErrorAction SilentlyContinue
      shell: pwsh
    
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin,x86_64-apple-darwin
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build Tauri app (Apple Silicon)
      run: npm run tauri build -- --target aarch64-apple-darwin
    
    - name: Sign macOS app (ad-hoc)
      run: |
        find src-tauri/target/aarch64-apple-darwin/release/bundle -name "*.app" -exec codesign --force --deep --sign - {} \;
    
    - name: List build artifacts (debug)
      run: |
        echo "Listing target directory:"
        ls -la src-tauri/target/aarch64-apple-darwin/release/bundle/ || echo "Bundle directory not found"
        find src-tauri/target -name "*.dmg" || echo "No macOS DMG found"
    
    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build Tauri app
      run: npm run tauri build
    
    - name: List build artifacts (debug)
      run: |
        echo "Listing target directory:"
        ls -la src-tauri/target/release/bundle/ || echo "Bundle directory not found"
        find src-tauri/target -name "*.deb" || echo "No Linux DEB found"
    
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: src-tauri/target/release/bundle/deb/*.deb

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List downloaded files
      run: find artifacts -type f -name "*" | head -20

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/windows-build/*.exe
          artifacts/macos-build/*.dmg
          artifacts/linux-build/*.deb
        draft: false
        prerelease: false
